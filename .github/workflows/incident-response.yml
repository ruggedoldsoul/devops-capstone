name: Incident Response Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *'  # runs every 15 minutes
  workflow_dispatch:          # allows manual trigger

jobs:
  health-check:
    name: Run Health Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Create sample log file
        run: |
          mkdir -p logs
          cat > logs/sample.log << 'EOF'
          2024-01-15 10:00:01 INFO Application started
          2024-01-15 10:01:15 ERROR Connection refused to database
          2024-01-15 10:01:16 ERROR Connection refused to database
          2024-01-15 10:02:30 CRITICAL Out of memory error detected
          2024-01-15 10:03:45 ERROR Timeout waiting for response
          2024-01-15 10:04:00 ERROR Connection refused to database
          2024-01-15 10:04:30 CRITICAL CPU usage critical
          2024-01-15 10:05:00 ERROR Timeout waiting for response
          2024-01-15 10:05:30 ERROR Connection refused to database
          2024-01-15 10:06:00 CRITICAL Out of memory error detected
          EOF

      - name: Run log analysis
        run: |
          python3 incident-response/analyse.py

      - name: Upload analysis report
        uses: actions/upload-artifact@v3
        with:
          name: incident-analysis-report
          path: logs/

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: health-check
    if: always()

    steps:
      - name: Notify on success
        if: needs.health-check.result == 'success'
        run: |
          echo "============================================================"
          echo "PIPELINE STATUS: ALL CHECKS PASSED"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Health check completed successfully"
          echo "Log analysis completed successfully"
          echo "============================================================"

      - name: Notify on failure
        if: needs.health-check.result == 'failure'
        run: |
          echo "============================================================"
          echo "PIPELINE STATUS: CHECKS FAILED - INCIDENT DETECTED"
          echo "Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Manual intervention may be required"
          echo "============================================================"

  documentation:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: health-check
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate pipeline report
        run: |
          mkdir -p reports
          cat > reports/pipeline-report.md << EOF
          # Incident Response Pipeline Report
          **Run Date:** $(date '+%Y-%m-%d %H:%M:%S')
          **Pipeline Status:** ${{ needs.health-check.result }}
          **Triggered By:** ${{ github.event_name }}
          **Branch:** ${{ github.ref_name }}

          ## Stages Completed
          - Health Check: ${{ needs.health-check.result }}
          - Log Analysis: Completed
          - Notification: Sent
          - Documentation: Generated

          ## Next Steps
          - Review logs in the artifacts section
          - Check Grafana dashboard for anomalies
          - Run rollback script if needed
          EOF
          cat reports/pipeline-report.md

      - name: Upload pipeline report
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-report
          path: reports/